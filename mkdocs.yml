site_name: Patricia Lo — Technical Writing Portfolio
site_description: Documentation samples demonstrating clear, developer-focused technical writing across cloud architecture and game development.
site_author: Patricia Lo
site_url: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/file-document-edit
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

nav:
  # - Home: index.md
  - Writing Samples:
      - AWS Serverless Architecture Guide: aws-serverless-guide/index.md
      - Unity Character Movement Tutorial: unity-movement-tutorial/index.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pkwlo
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/patricialo
      name: LinkedIn

extra_css:
  - stylesheets/extra.css

copyright: "&copy; 2026 Patricia Lo"
